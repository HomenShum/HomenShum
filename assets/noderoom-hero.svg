<svg width="820" height="300" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NodeRoom Live Startup Diligence War Room: humans and NodeAgents editing a shared diligence sheet with lock, draft and smart-merge, never clobbering each other.">
  <style>
    .t  { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; }
    .title { font-size: 19px; font-weight: 600; fill: #e6edf3; }
    .sub   { font-size: 12.5px; fill: #8b949e; }
    .hd    { font-size: 11.5px; font-weight: 600; fill: #8b949e; }
    .cell  { font-size: 12px; fill: #c9d1d9; }
    .mut   { font-size: 11px; fill: #8b949e; }
    .pill  { font-size: 11px; font-weight: 600; }
    .cap   { font-size: 12.5px; font-weight: 600; fill: #adbac7; }
  </style>

  <rect x="1" y="1" width="818" height="298" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <text x="28" y="40" class="t title">NodeRoom — Live Startup Diligence War Room</text>
  <text x="28" y="61" class="t sub">Multiple humans + multiple NodeAgents enrich one shared diligence sheet — together, without clobbering.</text>

  <circle cx="757" cy="34" r="5" fill="#3fb950"/>
  <text x="768" y="38" class="t pill" fill="#3fb950">live</text>

  <!-- spreadsheet -->
  <g>
    <rect x="28" y="86" width="512" height="158" rx="6" fill="#161b22" stroke="#21262d"/>
    <!-- header -->
    <text x="42"  y="106" class="t hd">Company</text>
    <text x="190" y="106" class="t hd">Stage</text>
    <text x="288" y="106" class="t hd">Raise</text>
    <text x="402" y="106" class="t hd">Owner</text>
    <line x1="28" y1="116" x2="540" y2="116" stroke="#21262d"/>
    <line x1="180" y1="86" x2="180" y2="244" stroke="#21262d"/>
    <line x1="278" y1="86" x2="278" y2="244" stroke="#21262d"/>
    <line x1="392" y1="86" x2="392" y2="244" stroke="#21262d"/>

    <!-- row 1: agent filling -->
    <rect x="278" y="120" width="114" height="28" fill="#10342b"/>
    <text x="42"  y="139" class="t cell">Acme AI</text>
    <text x="190" y="139" class="t cell">Series A</text>
    <text x="288" y="139" class="t cell" fill="#3fb9a0">$12M ▍</text>
    <text x="402" y="139" class="t mut">NodeAgent</text>

    <!-- row 2: human editing -->
    <rect x="392" y="150" width="146" height="28" fill="#0d2a4d"/>
    <text x="42"  y="169" class="t cell">Beta Labs</text>
    <text x="190" y="169" class="t cell">Seed</text>
    <text x="288" y="169" class="t cell">$3.5M</text>
    <text x="402" y="169" class="t cell" fill="#79c0ff">you ▍</text>

    <!-- row 3: locked / draft -->
    <text x="42"  y="199" class="t cell">Cumulus</text>
    <text x="190" y="199" class="t cell">Series B</text>
    <rect x="284" y="184" width="92" height="20" rx="4" fill="#3a2d05" stroke="#d29922" stroke-width="0.8"/>
    <text x="293" y="198" class="t pill" fill="#e3b341">draft-lock</text>
    <text x="402" y="199" class="t mut">agent · drafting</text>

    <!-- row 4 -->
    <text x="42"  y="229" class="t cell">Delphi</text>
    <text x="190" y="229" class="t cell">Pre-seed</text>
    <text x="288" y="229" class="t cell">$1.2M</text>
    <text x="402" y="229" class="t cell" fill="#3fb950">verified ✓</text>
  </g>

  <!-- cursors -->
  <g>
    <path d="M470 134 l0 14 l4 -4 l3 6 l3 -2 l-3 -6 l5 0 z" fill="#3fb9a0"/>
    <rect x="486" y="128" width="70" height="17" rx="8" fill="#10342b" stroke="#2ea043" stroke-width="0.8"/>
    <text x="495" y="140" class="t pill" fill="#56d4b0">NodeAgent</text>

    <path d="M452 164 l0 14 l4 -4 l3 6 l3 -2 l-3 -6 l5 0 z" fill="#79c0ff"/>
    <rect x="468" y="158" width="38" height="17" rx="8" fill="#0d2a4d" stroke="#1f6feb" stroke-width="0.8"/>
    <text x="477" y="170" class="t pill" fill="#79c0ff">you</text>
  </g>

  <!-- review-ready panel -->
  <g>
    <rect x="560" y="86" width="232" height="158" rx="6" fill="#161b22" stroke="#21262d"/>
    <text x="576" y="108" class="t hd">REVIEW-READY ARTIFACTS</text>
    <!-- runway mini bars -->
    <rect x="576" y="124" width="14" height="40" rx="2" fill="#1f6feb"/>
    <rect x="596" y="134" width="14" height="30" rx="2" fill="#1f6feb"/>
    <rect x="616" y="120" width="14" height="44" rx="2" fill="#1f6feb"/>
    <rect x="636" y="142" width="14" height="22" rx="2" fill="#388bfd"/>
    <rect x="656" y="130" width="14" height="34" rx="2" fill="#388bfd"/>
    <text x="676" y="150" class="t mut">runway chart</text>

    <text x="576" y="190" class="t cell">• Company brief</text>
    <text x="576" y="210" class="t cell">• Open questions <tspan fill="#e3b341">×3</tspan></text>
    <text x="576" y="230" class="t cell">• Source-backed cells <tspan fill="#3fb950">✓</tspan></text>
  </g>

  <!-- caption bar -->
  <rect x="1" y="262" width="818" height="37" rx="0" fill="#0b0f14"/>
  <line x1="1" y1="262" x2="819" y2="262" stroke="#21262d"/>
  <text x="28" y="285" class="t cap">lock → draft → smart-merge</text>
  <text x="232" y="285" class="t mut">no-clobber writes</text>
  <text x="360" y="285" class="t mut">per-element CAS versioning</text>
  <text x="548" y="285" class="t mut">deterministic no-key + live Convex/LLM</text>
</svg>
